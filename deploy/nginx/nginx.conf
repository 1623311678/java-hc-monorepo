# 电商高并发 — Nginx 反向代理配置

worker_processes auto;

events {
    worker_connections 4096;
    # 高并发优化: 使用 epoll
    use epoll;
    multi_accept on;
}

http {
    # ===== 基础配置 =====
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ===== 限流配置 (防刷) =====
    # 基于IP的请求限流: 每秒10个请求
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # 基于IP的连接限流: 每IP最多20个并发连接
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1024;

    # ===== 上游服务 (使用 resolver 动态解析，启动时不需要域名可用) =====
    resolver 127.0.0.11 valid=10s;  # Docker 内部 DNS

    server {
        listen 80;
        server_name localhost;

        # ===== 前端 (Next.js SSR) =====
        location / {
            set $frontend_host frontend;
            proxy_pass http://$frontend_host:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ===== API 网关 (Spring Cloud Gateway) =====
        location /api/ {
            # 限流: 突发20个请求，超出的直接503
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            set $gateway_host gateway;
            proxy_pass http://$gateway_host:7100/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # ===== 健康检查 =====
        location /health {
            access_log off;
            return 200 "OK";
        }
    }
}
