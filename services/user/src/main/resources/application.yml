server:
  port: 7101
spring:
  application:
    name: hc-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/hc_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 3000
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
      redisson:
        config: |
          singleServerConfig:
            address: "redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel:8080}

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationMustBe256BitsLong2024!}
  expiration: ${JWT_EXPIRATION:86400000}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
