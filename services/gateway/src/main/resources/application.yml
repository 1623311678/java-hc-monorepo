server:
  port: 7100

spring:
  application:
    name: hc-gateway
  config:
    import: "optional:nacos:hc-gateway.yml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
        file-extension: yml
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
    gateway:
      routes:
        - id: hc-user
          uri: lb://hc-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: hc-product
          uri: lb://hc-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1
        - id: hc-cart
          uri: lb://hc-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1
        - id: hc-order
          uri: lb://hc-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        - id: hc-payment
          uri: lb://hc-payment
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel:8080}
      eager: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationMustBe256BitsLong2024!}
  expiration: 86400000

gateway:
  ignore-urls:
    - /api/user/login
    - /api/user/register
    - /api/product/**
    - /api/payment/callback/**
