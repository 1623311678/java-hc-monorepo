server:
  port: 7103
spring:
  application:
    name: hc-cart
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
      redisson:
        config: |
          singleServerConfig:
            address: "redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel:8080}
